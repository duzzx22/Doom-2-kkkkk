<!-- Ícone SVG para Iron Epoch: 1899 -->
<!-- Salve como public/icon.svg e converta para PNG em 192x192 e 512x512 -->

<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#1a1a2e"/>
  
  <!-- Outer Circle -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#b59b6a" stroke-width="4"/>
  
  <!-- Gear Pattern -->
  <g transform="translate(256, 256)">
    <!-- Large gear in center -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#ffd700" stroke-width="3"/>
    
    <!-- Gear teeth -->
    <g id="teeth">
      <rect x="-8" y="80" width="16" height="20" fill="#ffd700"/>
      <rect x="-8" y="-100" width="16" height="20" fill="#ffd700"/>
    </g>
    
    <!-- Rotate teeth around circle -->
    <use href="#teeth" transform="rotate(45)"/>
    <use href="#teeth" transform="rotate(90)"/>
    <use href="#teeth" transform="rotate(135)"/>
    <use href="#teeth" transform="rotate(180)"/>
    <use href="#teeth" transform="rotate(225)"/>
    <use href="#teeth" transform="rotate(270)"/>
    <use href="#teeth" transform="rotate(315)"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="15" fill="#d32f2f"/>
    
    <!-- Crosshair -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#d32f2f" stroke-width="2"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#d32f2f" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#ffd700"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="480" font-size="28" font-family="'Press Start 2P', cursive" 
        fill="#b59b6a" text-anchor="middle" font-weight="bold">
    IRON EPOCH
  </text>
</svg>
